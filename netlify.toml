# ─── Parmate · Netlify Configuration ───
# One repo, two apps:
#   parmate.golf       → admin app (index.html)
#   play.parmate.golf  → player app (player/index.html)

[build]
  publish = "."

# ── Serve player app on play subdomain ──
[[redirects]]
  from   = "https://play.parmate.golf/*"
  to     = "/player/:splat"
  status = 200
  force  = true

# ── Service worker must be served from subdomain root ──
[[redirects]]
  from   = "https://play.parmate.golf/sw.js"
  to     = "/player/sw.js"
  status = 200
  force  = true

# ── Manifest ──
[[redirects]]
  from   = "https://play.parmate.golf/manifest.json"
  to     = "/player/manifest.json"
  status = 200
  force  = true

# ── Headers for PWA files ──
[[headers]]
  for = "/player/sw.js"
  [headers.values]
    Content-Type  = "application/javascript"
    Cache-Control = "no-cache"

[[headers]]
  for = "/player/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/player/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers for both apps ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
